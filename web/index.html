<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사과게임 (Apple Game) - Integrated</title>

    <!-- 폰트 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=Hahmlet:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="tokens.css">

    <style>
        html, body {
            margin: 0; padding: 0;
            background: #1B2410;
            font-family: var(--font-body);
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            height: 100vh;
            overflow: hidden;
        }
        * { box-sizing: border-box; }
        #root { width: 100vw; height: 100vh; }
        button { font-family: inherit; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .combo-text {
            position: absolute;
            pointer-events: none;
            font-family: var(--font-num);
            font-weight: 900;
            font-style: italic;
            color: var(--apple);
            text-shadow: 2px 2px 0 var(--paper), -2px -2px 0 var(--paper), 2px -2px 0 var(--paper), -2px 2px 0 var(--paper), 4px 4px 0 var(--ink);
            animation: comboPop 0.5s ease-out forwards;
            z-index: 50;
        }

        @keyframes comboPop {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; transform: translateY(-50px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>

    <!-- Core Logic -->
    <script src="../core/engine.js"></script>
    <script src="../core/generator.js"></script>

    <!-- Components -->
    <script type="text/babel" src="components/apple-cell.jsx?v=2"></script>
    <script type="text/babel" src="components/screens-main.jsx?v=2"></script>
    <script type="text/babel" src="components/screens-settings.jsx?v=2"></script>
    <script type="text/babel" src="components/screens-game.jsx?v=2"></script>
    <script type="text/babel" src="components/screens-result.jsx?v=2"></script>

    <!-- App Logic -->
    <script type="text/babel" src="app.jsx?v=2"></script>
</body>
</html>
