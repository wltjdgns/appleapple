<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사과게임 (Apple Game)</title>

    <!-- 폰트 로드 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&family=DM+Serif+Display:ital@0;1&family=Hahmlet:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="tokens.css">

    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--paper);
            color: var(--ink);
            font-family: var(--font-body);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .scene {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        .scene.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2 {
            font-family: var(--font-display);
            color: var(--ink);
            letter-spacing: -0.04em;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 30px;
            line-height: 1.1;
        }
        
        h1 span {
            color: var(--apple);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        button {
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: var(--font-body);
            cursor: pointer;
            border: 1.5px solid transparent;
            border-radius: 14px;
            background-color: var(--apple);
            color: white;
            transition: all 0.2s;
            box-shadow: 0 1px 0 #6B1212 inset, 0 -2px 0 #8E1A1A inset, 0 8px 18px rgba(155,28,28,0.25);
            letter-spacing: -0.01em;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 1px 0 #6B1212 inset, 0 -2px 0 #8E1A1A inset, 0 10px 24px rgba(155,28,28,0.35);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background-color: var(--paper-warm);
            color: var(--ink);
            border-color: var(--hairline);
            box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 -2px 0 rgba(0,0,0,0.06) inset, 0 4px 12px rgba(107,66,38,0.08);
        }

        button.secondary:hover {
            background-color: var(--paper-dark);
            box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 -2px 0 rgba(0,0,0,0.06) inset, 0 6px 16px rgba(107,66,38,0.12);
        }

        button.disabled {
            background-color: var(--paper-warm);
            color: var(--ink-mute);
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.6;
        }

        /* Settings Form */
        .settings-card {
            background: var(--paper-warm);
            padding: 30px;
            border-radius: var(--r-xl);
            border: 1.5px solid var(--hairline);
            box-shadow: var(--shadow-card);
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item label {
            font-weight: 700;
            color: var(--ink);
            font-size: 0.95rem;
        }

        select, input {
            padding: 12px;
            border: 1.5px solid var(--hairline);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--paper);
            color: var(--ink);
            font-family: var(--font-body);
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--apple);
        }

        .grid-inputs {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-inputs input {
            width: 100%;
        }

        /* Game UI */
        #game-container {
            position: relative;
            max-width: none;
        }

        canvas {
            background-color: var(--paper);
            border: 1.5px solid var(--ink);
            border-radius: 18px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 8px 24px rgba(107,66,38,0.10);
            cursor: crosshair;
            max-width: 95vw;
            max-height: 80vh;
        }

        #hud {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
            padding: 14px 22px;
            background: var(--paper);
            border: 1.5px solid var(--ink);
            border-radius: 16px;
            box-shadow: 4px 4px 0 var(--ink);
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .hud-item.center {
            align-items: center;
            text-align: center;
        }

        .hud-label {
            font-family: var(--font-mono);
            font-size: 10px;
            color: var(--ink-mute);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .hud-value {
            font-family: var(--font-num);
            font-size: 36px;
            color: var(--ink);
            line-height: 1;
            margin-top: 4px;
        }

        #timer {
            font-size: 48px;
        }

        .timer-warning {
            color: var(--apple) !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .game-info-badge {
            font-family: var(--font-body);
            font-size: 13px;
            color: var(--ink);
            font-weight: 700;
            margin-top: 4px;
        }

        /* Result Popup */
        #scene-result {
            background: var(--paper-warm);
            padding: 40px;
            border-radius: 30px;
            border: 1.5px solid var(--ink);
            box-shadow: var(--shadow-deep);
            z-index: 100;
        }

        .result-score {
            font-family: var(--font-num);
            font-size: 5rem;
            color: var(--apple);
            font-weight: 800;
            margin: 10px 0;
            text-shadow: 0 5px 15px rgba(214, 40, 40, 0.2);
            line-height: 1;
        }

        .combo-text {
            position: absolute;
            pointer-events: none;
            font-family: var(--font-num);
            font-weight: 900;
            font-style: italic;
            color: var(--apple);
            text-shadow: 2px 2px 0 var(--paper), -2px -2px 0 var(--paper), 2px -2px 0 var(--paper), -2px 2px 0 var(--paper), 4px 4px 0 var(--ink);
            animation: comboPop 0.5s ease-out forwards;
            z-index: 50;
        }

        @keyframes comboPop {
            0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; transform: translateY(-50px); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. 메인 화면 -->
    <div id="scene-main" class="scene active">
        <h1>사과<br>사과<span>게임</span></h1>
        <div id="user-info" class="hidden" style="margin-bottom: 20px; font-weight: 500;">
            환영합니다, <span id="user-name" style="color: #ff4d4d; font-weight: 700;"></span>님!
        </div>
        <div class="menu-buttons">
            <div id="login-menu" style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <button id="btn-login" onclick="login()">구글 로그인</button>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <input type="text" id="guest-name" placeholder="게스트 닉네임" style="flex: 1; padding: 10px; font-size: 0.9rem;">
                    <button onclick="loginAsGuest()" class="secondary" style="padding: 10px 20px; font-size: 0.9rem; white-space: nowrap;">게스트 시작</button>
                </div>
            </div>
            <div id="logged-in-menu" class="hidden" style="display: flex; flex-direction: column; gap: 15px; width: 100%;">
                <button onclick="showScene('scene-settings')">혼자하기</button>
                <div style="display: flex; gap: 10px;">
                    <button onclick="fetchAndShowRecords()" style="flex: 1;">나의 기록</button>
                    <button onclick="fetchAndShowLeaderboard()" style="flex: 1; background-color: #fbc02d; color: #333;">리더보드</button>
                </div>
                <button class="disabled">같이하기 (Coming Soon)</button>
                <button onclick="logout()" class="secondary" style="margin-top: 10px; padding: 10px; font-size: 1rem;">로그아웃</button>
            </div>
        </div>
    </div>

    <!-- 2. 설정 화면 -->
    <div id="scene-settings" class="scene">
        <h2 style="margin: 0; color: #333;">게임 설정</h2>
        <div class="settings-card">
            <div class="setting-item">
                <label>⏳ 시간 모드</label>
                <select id="timeMode">
                    <option value="120">2분 (제한 시간)</option>
                    <option value="infinite">무한 시간</option>
                </select>
            </div>
            
            <div class="setting-item">
                <label>📏 배열 크기 (최대 50x50)</label>
                <div class="grid-inputs">
                    <input type="number" id="colsInput" value="17" min="5" max="50" placeholder="가로">
                    <span style="color: #adb5bd;">×</span>
                    <input type="number" id="rowsInput" value="10" min="5" max="50" placeholder="세로">
                </div>
            </div>

            <div class="setting-item">
                <label>🍎 클리어 가능 여부</label>
                <select id="seedType">
                    <option value="random">랜덤 생성 (일반)</option>
                    <option value="perfect">퍼펙트 시드 (100% 가능)</option>
                </select>
            </div>

            <div class="setting-item">
                <label>✨ 클리어 타입</label>
                <select id="clearType">
                    <option value="original">오리지널 (합계 10)</option>
                    <option value="multiples">10의 배수 (10, 20...)</option>
                </select>
            </div>

            <button onclick="startGame()" style="margin-top: 10px;">게임 시작!</button>
            <button onclick="showScene('scene-main')" class="secondary">뒤로 가기</button>
        </div>
    </div>

    <!-- 3. 게임 화면 -->
    <div id="scene-game" class="scene" style="max-width: none;">
        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">Score</span>
                <span id="score" class="hud-value">0</span>
            </div>
            <div class="hud-item" style="align-items: center; gap: 5px;">
                <div id="timer" class="hud-value">02:00</div>
                <div id="game-badge" class="game-info-badge">17x10 | 오리지널</div>
            </div>
            <button onclick="quitGame()" style="padding: 8px 16px; font-size: 0.9rem; background-color: #6c757d; box-shadow: none;">종료</button>
        </div>
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="combo-layer"></div>
        </div>
    </div>

    <!-- 4. 나의 기록 화면 -->
    <div id="scene-records" class="scene" style="max-width: 800px;">
        <h2 style="margin: 0; color: #333;">나의 기록</h2>
        <div class="settings-card" style="overflow-x: auto; width: 90vw;">
            <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 500px;">
                <thead>
                    <tr style="border-bottom: 2px solid #eee; text-align: left;">
                        <th style="padding: 12px;">모드</th>
                        <th style="padding: 12px;">판수</th>
                        <th style="padding: 12px;">최고</th>
                        <th style="padding: 12px;">평균</th>
                        <th style="padding: 12px;">시간</th>
                    </tr>
                </thead>
                <tbody id="records-list">
                    <!-- 데이터 동적 삽입 -->
                </tbody>
            </table>
            <button onclick="showScene('scene-main')" class="secondary" style="margin-top: 20px;">메인으로</button>
        </div>
    </div>

    <!-- 5. 리더보드 (글로벌 랭킹) 화면 -->
    <div id="scene-leaderboard" class="scene" style="max-width: 800px;">
        <h2 style="margin: 0; color: #fbc02d; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">🏆 리더보드 (글로벌 랭킹)</h2>
        <div class="settings-card" style="width: 90vw;">
            <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
                <select id="lb-time" style="padding: 8px;">
                    <option value="120">2분 모드</option>
                    <option value="infinite">무한 모드</option>
                </select>
                <select id="lb-size" style="padding: 8px;">
                    <option value="17x10">17x10 (기본)</option>
                    <option value="50x50">50x50 (최대)</option>
                </select>
                <select id="lb-sort" style="padding: 8px; background-color: #fff9c4;">
                    <option value="highScore">최고 점수 순</option>
                    <option value="playCount">판수 순</option>
                    <option value="totalPlayTime">플레이 타임 순</option>
                </select>
                <button onclick="fetchAndShowLeaderboard()" style="padding: 8px 15px; font-size: 0.9rem;">조회</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 500px;">
                    <thead>
                        <tr style="border-bottom: 2px solid #eee; text-align: left; background-color: #fdfdfd;">
                            <th style="padding: 12px; width: 60px;">순위</th>
                            <th style="padding: 12px;">닉네임</th>
                            <th style="padding: 12px;">기록</th>
                            <th style="padding: 12px;">판수</th>
                            <th style="padding: 12px;">시간</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-list">
                        <!-- 랭킹 데이터 동적 삽입 -->
                    </tbody>
                </table>
            </div>
            <button onclick="showScene('scene-main')" class="secondary" style="margin-top: 20px;">메인으로</button>
        </div>
    </div>

    <!-- 6. 게임 결과 팝업 -->
    <div id="scene-result" class="scene">
        <h2 style="margin: 0; color: #666;">GAME OVER</h2>
        <div class="hud-label">최종 점수</div>
        <div id="final-score" class="result-score">0</div>
        <div id="result-badge" class="game-info-badge" style="margin-bottom: 30px;">17x10 | 오리지널</div>
        <div class="menu-buttons">
            <button onclick="startGame()">같은 모드로 재시작</button>
            <button onclick="showScene('scene-settings')" class="secondary">다른 설정으로 하기</button>
            <button onclick="showScene('scene-main')" class="secondary" style="background-color: #333;">메인으로</button>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>

    <!-- Core Logic -->
    <script src="../core/engine.js"></script>
    <script src="../core/generator.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
