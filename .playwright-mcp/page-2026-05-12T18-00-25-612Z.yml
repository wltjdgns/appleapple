          - strong [ref=e37]: 난이도는 원본 사과게임과 같다
          - text: .
      - heading "1. 서론" [level=2] [ref=e40]
      - paragraph [ref=e41]: 사과게임(フルーツボックス)은 17×10 격자에 1~9 숫자가 깔리고, 합이 10이 되는 직사각형 영역을 골라 지우는 퍼즐 게임이다. 간단하지만 중독성 있는 이 게임을 수 백 판씩 하다 보면, 이 게임의 난이도는 매 판 달라지며 보드의 숫자 분포에 따라 결정된다는 것을 알게 된다. 주로 큰 숫자가 많을수록 어려울 확률이 높고, 어떤 경우는 최적에 가까운 풀이법으로도 매우 낮은 점수밖에 얻지 못한다.
      - paragraph [ref=e42]: 극단적으로 생각해보면 이렇다.
      - list [ref=e43]:
        - listitem [ref=e44]:
          - text: 170칸이 전부
          - strong [ref=e45]: "9"
          - text: 라면 총합은 1,530이지만, 어떤 조합으로도 합 10을 만들 수 없어서 점수는
          - strong [ref=e46]: 0점
        - listitem [ref=e47]:
          - text: 반대로 전부
          - strong [ref=e48]: "1"
          - text: 이라면 총합은 170이고, 아무 10칸만 골라도 합이 10이 되니 거의
          - strong [ref=e49]: 만점
          - text: 에 가까운 판
      - paragraph [ref=e50]: 실제 보드는 물론 이 둘 사이 어딘가에 있다. 그래도 큰 숫자(7, 8, 9)가 많으면 확실히 빡빡하고, 낮은 숫자가 많으면 상대적으로 조합을 만들기가 쉬워진다. 일정 수준 이상의 플레이어라면 제한시간이 끝난 시점에 '보이는' 숫자쌍은 거의 찾게 되므로, 보드의 숫자가 얼마나 잘 나오는지가 점수를 결정하는데 큰 역할을 한다.
      - paragraph [ref=e51]: 파생 게임 중에는 이걸 "불공평하다"고 보고 숫자 분포를 일부러 조정하는 경우도 있다. 하지만 나는 오히려 이 운 요소가 원작의 핵심 재미라고 생각한다. 매 판 난이도가 조금씩 다르기 때문에 긴장감이 생기고, 난이도에 따라 전략도 다양해진다. 특히나 대결을 하는 경우에 이러한 보드 운 요소가 큰 재미 요소가 되는데, 누군가는 좋은 보드에서 최고의 득점을 내고, 누군가는 좋지 않은 보드에서 최대한의 점수를 내기 때문에 승부가 더 예측불가능해지고 흥미진진해진다.
      - paragraph [ref=e52]: 다만 원본의 게임으로는 같은 보드로 게임하는 것이 불가능하고, 때문에 N판의 평균을 가지고 대결을 한다던가 하는 방식으로 대결할 수밖에 없었다. N이 충분히 크지 않기 때문에 가끔은 불쾌할 정도로 운의 요소가 너무 커질 때가 있었고, 그래서 같은 보드로 함께 플레이할 수 있는 이 게임을 만들게 되었다. 원본처럼 보드의 난이도가 매 판 바뀌는 점은 유지하면서도, 같은 보드로 플레이하므로 '보드의 난이도를 고려한 전략' 또한 게임의 일부가 되도록 하고 싶었다.
      - paragraph [ref=e53]: 따라서 "원본과 최대한 같은 난이도 분포를 재현하는 것"은 중요했다. 더 어렵지도 쉽지도 않게. 그래서 원본 게임에서 500개의 보드를 모아서 어떤 방식으로 생성되는지 분석해봤다.
