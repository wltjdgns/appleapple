        - heading "요약" [level=3] [ref=e33]
        - paragraph [ref=e34]: 원본 사과게임(フルーツボックス)에서 보드 500개를 스크린샷과 OCR로 추출한 뒤, 생성 알고리즘이 어떻게 돌아가는지 통계적으로 분석해봤다. 총 85,000개의 숫자를 확인한 결과, 각각의 칸은 1~9 사이에서 독립적으로 균등하게 뽑히고, 위치 편향이나 인접 칸 상관, 특정 숫자 쏠림 같은 패턴은 보이지 않았다. 또한 한 보드의 모든 숫자 전체합은 보드마다 달랐으며, 모두 10의 배수임을 확인할 수 있었다. 이를 통해 우리는 우리가 오마주한 원본 사과게임이 Rejection Sampling으로 보드를 생성한다고 추정했고, 이를 구현해서 생성한 보드는 KS 검정 결과 원본 데이터와 유의미한 차이가 없었다 (p=0.65).
